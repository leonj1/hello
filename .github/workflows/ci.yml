name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate HTML
        run: |
          echo "Checking HTML files exist..."
          for f in index.html chat.html; do
            if [ ! -f "$f" ]; then
              echo "ERROR: $f not found"
              exit 1
            fi
            echo "✓ $f exists"
          done

      - name: Check for broken local links
        run: |
          echo "Scanning for broken local references..."
          ERRORS=0
          for html in *.html; do
            # Extract local href/src references (not http/https/mailto/javascript)
            refs=$(grep -oP '(?:href|src)="(?!https?://|mailto:|javascript:)([^"#]+)' "$html" | sed 's/.*="//' || true)
            for ref in $refs; do
              if [ ! -f "$ref" ]; then
                echo "WARN: $html references '$ref' which doesn't exist"
                ERRORS=$((ERRORS + 1))
              fi
            done
          done
          if [ "$ERRORS" -gt 0 ]; then
            echo "Found $ERRORS broken reference(s)"
          else
            echo "✓ No broken local references"
          fi

  smoke-test:
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Wait for deployment
        run: |
          echo "Waiting 60s for deployer webhook to process..."
          sleep 60

      - name: Run smoke tests
        run: |
          BASE_URL="${DEPLOY_URL:-https://leonj1-hello.joseserver.com}"
          PASS=0
          FAIL=0

          run_test() {
            local desc="$1" url="$2" expected="$3"
            status=$(curl -o /dev/null -s -w "%{http_code}" --max-time 10 "$url" || echo "000")
            if [ "$status" = "$expected" ]; then
              echo "✅ PASS: $desc (HTTP $status)"
              PASS=$((PASS + 1))
            else
              echo "❌ FAIL: $desc (expected $expected, got $status)"
              FAIL=$((FAIL + 1))
            fi
          }

          run_test "GET /" "$BASE_URL/" "200"
          run_test "GET /index.html" "$BASE_URL/index.html" "200"
          run_test "GET /chat.html" "$BASE_URL/chat.html" "200"

          echo ""
          echo "Results: $PASS passed, $FAIL failed"
          [ "$FAIL" -eq 0 ] || exit 1
        env:
          DEPLOY_URL: ${{ vars.DEPLOY_URL }}
