server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve static files, return 404 for missing files
    location / {
        try_files $uri $uri/ =404;
    }

    # Proper MIME types for HTML files
    types {
        text/html                             html htm;
        text/css                              css;
        application/javascript                js;
        image/x-icon                          ico;
        image/png                             png;
        image/jpeg                            jpg jpeg;
        image/gif                             gif;
        image/svg+xml                         svg;
        application/json                      json;
        font/woff                             woff;
        font/woff2                            woff2;
    }

    # Return proper 404 status for missing resources
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Gzip compression
    gzip on;
    gzip_types text/html text/css application/javascript;
}
